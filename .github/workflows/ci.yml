name: CI
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

# 同一分支有新 push 時，取消還在跑的舊 CI
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      NUXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NUXT_PUBLIC_SUPABASE_KEY: dummy-anon-key-for-ci
    
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: cp .env.example .env

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm build

    